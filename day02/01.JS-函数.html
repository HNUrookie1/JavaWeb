<script>
    //函数定义-1
    function add(a,b){
        return a + b;
    }

    //函数调用-1
    var result = add(10,20);
    alert(result);

    //函数定义和调用-2
    var div = function(a,b){
        return a/b;
    }

    var result2 = div(10,2,1,1,1);
    alert(result2);
    //注意，JS中函数调用可以传递任意个数的参数

</script>
