<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-事件-案例</title>
</head>
<body>
    
    <img src="img/off.png" id="img">
    <br><br>
    <input type="button"  value="点亮" onclick="lightOn()">
    <input type="button"  value="熄灭" onclick="lightOff()">
    <br><br>
    <input type="text" id="site" value="ITCAST" onfocus="lower()" onblur="upper()">

    <br><br>
    <label><input type="checkbox" name="hobby" value="1">电影</label>
    <label><input type="checkbox" name="hobby" value="2">旅游</label>
    <label><input type="checkbox" name="hobby" value="3">游戏</label>
    <br><br>

    <input type="button" value="全选" onclick="selectAll()">
    <input type="button" value="反选" onclick="selectNothing()">
</body>

<script>
    function lightOn(){
        document.getElementById("img").src = "img/on.png";
    }

    function lightOff(){
        document.getElementById("img").src = "img/off.png";
    }

    //2、输入框聚焦后展示小写；输入框离焦后展示大写 --onfocus,onblur
    function lower(){
        var input = document.getElementById("site");
        input.value = input.value.toLowerCase();
    }

    function upper(){
        var input = document.getElementById("site");
        input.value = input.value.toUpperCase();
    }

    //3、点击"全选"按钮使得所有复选框呈现被选择状态；点击"反选"按钮使得所有复选框呈现取消勾选状态
    function selectAll(){
        var checks = document.getElementsByName("hobby");
        for(let i = 0;i < checks.length; i++){
            checks[i].checked = true;
        }
    }

    function selectNothing(){
        var checks = document.getElementsByName("hobby");
        for(let i = 0;i < checks.length;i ++){
            checks[i].checked = false;
        }
    }
</script>

</html>
